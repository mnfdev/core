language: cpp

sudo: false

cache:
    apt: true
    directories:
        - $HOME/depend

matrix:
    include:
      # latest xcode for macOS 10.12
      - os: osx
        osx_image: xcode9.2
        compiler: clang
        env: PSCC=clang PSCXX=clang++
        
install:
    - |
        echo "*** Check versions ***"
        if [ "$TRAVIS_OSX_IMAGE" == "xcode9.2" ]; then
            HOMEBREW_NO_AUTO_UPDATE=1 brew install python3
        fi
        python3 --version
        pip3 --version
        pip3 install conan
        conan --version
        cmake --version
        rake --version

before_script:
    - cd ${TRAVIS_BUILD_DIR}
    - cd prosoft/core/tests
    - export CC=${PSCC} CXX=${PSCXX}

script:
  - |
    rake

after_success:
  - bash <(curl -s https://codecov.io/bash) || true
